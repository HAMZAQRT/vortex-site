name: Vortex Final Build
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: |
          # تثبيت المكتبات بناءً على ملف package.json الجديد
          npm install
          
      - name: Build Android Project
        run: |
          # إنشاء مجلد أندرويد الذي كان مفقوداً
          npx cap add android
          npx cap sync android
          
          # إصلاح التوافق مع Java 17 داخل ملفات Gradle آلياً
          find android/ -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} +
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Decode Keystore
        run: |
          # فك تشفير المفتاح
          echo "${{ secrets.KEYSTORE_FILE }}" | tr -dc 'a-zA-Z0-9+/=' | base64 --decode > android/app/release.jks

      - name: Generate Signed APK & AAB
        run: |
          cd android
          chmod +x gradlew
          # بناء APK للتجربة و AAB للرفع على جوجل
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: "v2.0.${{ github.run_number }}"
          name: "Vortex Pro v2.0.${{ github.run_number }}"
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
