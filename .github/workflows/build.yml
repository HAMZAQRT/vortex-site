name: Vortex Production Build
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Build Preparation
        run: |
          echo '{"name": "vortex-app", "version": "1.0.0"}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android
          
          # إصلاحات جوهرية للتوافق مع متجر جوجل
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          
          # تحديث إعدادات Java في ملفات أندرويد لتجنب خطأ "invalid source release: 21"
          sed -i 's/sourceCompatibility JavaVersion.VERSION_17/sourceCompatibility JavaVersion.VERSION_21/g' android/app/build.gradle
          sed -i 's/targetCompatibility JavaVersion.VERSION_17/targetCompatibility JavaVersion.VERSION_21/g' android/app/build.gradle
          
          npx cap sync android

      - name: Decode Keystore
        run: |
          # فك تشفير المفتاح وتجهيزه للتوقيع
          echo "${{ secrets.KEYSTORE_FILE }}" | tr -dc 'a-zA-Z0-9+/=' | base64 --decode > android/app/release.jks

      - name: Generate Signed APK
        run: |
          cd android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          
          # تحديث Gradle Wrapper لضمان التوافق مع Java 21
          ./gradlew wrapper --gradle-version 8.5
          
          # البناء مع تعطيل المهام الخلفية لضمان الاستقرار
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon --stacktrace

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Vortex Release v1.0.${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
