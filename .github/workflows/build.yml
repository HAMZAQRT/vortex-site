name: Vortex Success Final
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install & Sync
        run: |
          npm install
          mkdir -p www && cp index.html www/
          rm -rf android
          npx cap add android
          npx cap sync android
          find android/ -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} +

      - name: Force Keystore Placement
        run: |
          # فك تشفير المفتاح ووضعه في المجلد الرئيسي لأندرويد
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/my-release-key.jks
          # وضع نسخة ثانية في المجلد الذي يطلبه Gradle تحديداً
          mkdir -p /home/runner/.gradle/daemon/8.2.1/
          cp android/app/my-release-key.jks /home/runner/.gradle/daemon/8.2.1/my-release-key.jks

      - name: Build & Sign APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=my-release-key.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-App-Official
          path: android/app/build/outputs/apk/release/*.apk
