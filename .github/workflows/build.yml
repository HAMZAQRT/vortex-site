name: Vortex Final Fix
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Prepare Files & Build
        run: |
          npm install
          # إنشاء مجلد www ونقل الملفات إليه لإرضاء Capacitor
          mkdir -p www
          cp index.html www/
          cp -r *.svg www/ 2>/dev/null || true
          cp -r *.png www/ 2>/dev/null || true
          
          # مسح المجلد القديم وبناء واحد جديد
          rm -rf android
          npx cap add android
          npx cap sync android
          
          # إصلاح الجافا
          find android/ -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} +

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/my-release-key.jks

      - name: Build Official APK
        run: |
          cd android && chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=my-release-key.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Official-App
          path: android/app/build/outputs/apk/release/*.apk
