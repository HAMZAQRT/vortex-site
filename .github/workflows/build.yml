name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Prepare and Build
        run: |
          # 1. تجهيز مجلد الويب ونقل ملفاتك إليه
          mkdir www
          cp -r index.html www/ 2>/dev/null || true
          cp -r * www/ 2>/dev/null || true
          
          # 2. إنشاء ملفات الإعدادات
          echo '{"name": "vortextrust", "version": "1.0.0"}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 3. تهيئة الأندرويد (تعديل المسار إلى www)
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android
          npx cap copy
          
          # 4. البناء النهائي
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
