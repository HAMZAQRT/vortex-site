name: Build Signed APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Decode Keystore
        run: |
          import os
          import base64
          keystore_b64 = os.environ['KEYSTORE_FILE']
          # حفظ الملف في مكان ثابت ومؤكد
          with open("android/my-release-key.jks", "wb") as f:
              f.write(base64.b64decode(keystore_b64))
        shell: python
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}

      - name: Build Android Project
        run: |
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android
          npx cap copy
          
          cd android
          chmod +x gradlew
          # استخدام المسار المباشر للملف لضمان عدم الضياع
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/my-release-key.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Signed-APK
          path: android/app/build/outputs/apk/release/*.apk
