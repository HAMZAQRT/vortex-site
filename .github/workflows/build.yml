name: Vortex Force Build Success
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Preparation & Key Force Path
        run: |
          npm install
          mkdir -p www && cp index.html www/
          rm -rf android
          npx cap add android
          npx cap sync android
          
          # 1. إنشاء المسار الذي يطلبه النظام في الصورة بالضبط
          mkdir -p /home/runner/.gradle/daemon/8.2.1/
          
          # 2. نسخ الملف الذي رفعته أنت إلى ذلك المسار الإجباري
          cp my-release-key.jks /home/runner/.gradle/daemon/8.2.1/my-release-key.jks
          
          # 3. وضع نسخة إضافية في المجلد المعتاد للاحتياط
          cp my-release-key.jks android/app/my-release-key.jks
          
          find android/ -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} +

      - name: Build Signed Production APK
        run: |
          cd android
          chmod +x gradlew
          # إجبار Gradle على استخدام المسار الذي يريده
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=/home/runner/.gradle/daemon/8.2.1/my-release-key.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Export Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Network-Final-OK
          path: android/app/build/outputs/apk/release/*.apk
