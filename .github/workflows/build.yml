name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # التحديث المطلوب في التحذير

      - name: Initialize and Build
        run: |
          # إنشاء ملفات الإعدادات الأساسية
          echo '{"name": "vortextrust", "version": "1.0.0"}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # تهيئة المشروع
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir .
          npx cap add android
          
          # نسخ ملفات الـ HTML والـ CSS للأندرويد
          npx cap copy
          
          # بناء ملف الـ APK النهائي
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
