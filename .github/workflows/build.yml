name: Vortex Official Production Build
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Clean & Sync Android
        run: |
          npm install
          mkdir -p www && cp index.html www/
          rm -rf android
          npx cap add android
          npx cap sync android
          
          # التأكد من وجود الملف المرفوع ونقله للمجلد الصحيح
          if [ -f "my-release-key.jks" ]; then
            cp my-release-key.jks android/app/my-release-key.jks
          else
            echo "Error: my-release-key.jks not found in repository!"
            exit 1
          fi
          
          find android/ -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} +

      - name: Build Signed Production APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=my-release-key.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Export Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Network-Official
          path: android/app/build/outputs/apk/release/*.apk
