name: Final Build for Google Play
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Initialize Project Environment
        run: |
          # إنشاء ملف package.json إذا لم يكن موجوداً ليتعرف عليه النظام
          if [ ! -f package.json ]; then
            echo '{"name": "vortex-app", "version": "1.0.0", "dependencies": {}}' > package.json
          fi
          
          # تثبيت الأدوات اللازمة
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # تجهيز مجلد الويب ونسخ ملفات HTML الخاصة بك إليه
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          
          # تهيئة Capacitor ومزامنة الملفات الجديدة
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www --confirm
          npx cap add android || true
          npx cap sync android

      - name: Decode Signing Key
        run: |
          # فك تشفير المفتاح الذي وضعته في Secrets
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/release.jks

      - name: Build Signed APK
        run: |
          cd android && chmod +x gradlew
          # تنظيف وبناء نسخة جديدة كلياً
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Vortex App - New Update ${{ github.run_number }}"
          files: "**/*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
