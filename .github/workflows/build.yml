name: Production Build
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Project From Scratch
        run: |
          # 1. إنشاء ملفات التعريف الأساسية
          echo '{"name": "vortex-app", "version": "1.1.0", "dependencies": {}}' > package.json
          
          # 2. تثبيت الأدوات
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 3. تجهيز ملفات الويب (HTML)
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          
          # 4. إعادة بناء مجلد الأندرويد لضمان عدم وجود أخطاء قديمة
          rm -rf android
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www --confirm
          npx cap add android
          npx cap sync android

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/release.jks

      - name: Build Final APK
        run: |
          cd android && chmod +x gradlew
          # أمر البناء المباشر والآمن
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.1.${{ github.run_number }}"
          name: "Vortex Final Build ${{ github.run_number }}"
          files: "**/*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
