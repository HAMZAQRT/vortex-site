name: Build Play Store Ready APK
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Prepare Website Files
        run: |
          # التأكد من وجود مجلد الويب ونسخ ملفات HTML إليه
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          
      - name: Initialize Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android
          npx cap copy

      - name: Decode Signing Key
        run: |
          # فك تشفير مفتاح التوقيع الخاص بك (ضروري لمتجر بلاي)
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/release.jks

      - name: Build Signed APK
        run: |
          cd android && chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload Final APK to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "release-v1.${{ github.run_number }}"
          name: "Vortex App V1.${{ github.run_number }} (Google Play Ready)"
          # البحث عن الملف ورفعه مهما كان مكانه
          files: "**/*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
