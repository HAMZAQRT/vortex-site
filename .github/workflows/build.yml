name: Vortex Final Production Build
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install & Sync
        run: |
          npm install
          npx cap add android
          npx cap sync android
          # إصلاح التوافقية مع Java 17 آلياً
          find android/ -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} +

      - name: Decode Keystore from Secrets
        run: |
          # هنا نستخدم المفتاح السري الذي وضعته أنت في GitHub Secrets
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/release.jks

      - name: Build Signed App (APK & AAB)
        run: |
          cd android && chmod +x gradlew
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload Production Files
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Production-Ready
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
