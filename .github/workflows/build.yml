name: Sign and Build APK
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Prepare Web Files
        run: |
          # إنشاء ملف التعريف وتجهيز ملفات الـ HTML
          echo '{"name": "vortex-app", "version": "1.0.0"}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www --confirm
          npx cap add android || true
          npx cap sync android

      - name: Use Secrets for Keystore
        run: |
          # فك تشفير ملف المفتاح من السكريت وضعه في مسار الأندرويد
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/release.jks

      - name: Build Signed APK
        run: |
          cd android && chmod +x gradlew
          # استخدام كلمات السر من السكريت (يجب أن تطابق الأسماء في إعدادات GitHub)
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Create New Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}-signed"
          name: "Vortex Signed Update ${{ github.run_number }}"
          # رفع ملف الـ APK النهائي
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
