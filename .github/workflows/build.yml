name: Build and Release APK
on:
  push:
    branches:
      - main

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build APK
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www && cp -r * www/ 2>/dev/null || true
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android && npx cap copy
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/my-release-key.jks
          cd android && chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=my-release-key.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Prepare APK for Release
        run: |
          # بحث آمن داخل مجلد الأندرويد فقط واستخراج الملف
          find android -type f -name "*.apk" -exec cp {} VortexApp-Release.apk \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Vortex Update #${{ github.run_number }}"
          body: "تطبيق Vortex جاهز للتحميل والتثبيت."
          files: VortexApp-Release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
