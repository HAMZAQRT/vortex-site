name: Vortex Production Build
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Preparation
        run: |
          # 1. تثبيت Capacitor
          echo '{"name": "vortex-app", "version": "1.0.0"}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 2. تجهيز ملفات الويب (المهمة جداً للرفع على جوجل)
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          
          # 3. إنشاء مشروع أندرويد مستقر
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android
          
          # 4. إصلاح ملفات Gradle يدوياً لتجنب أخطاء الصور السابقة
          # استخدام Java 17 بدلاً من 21 لضمان استقرار المكتبات الحالية
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          npx cap sync android

      - name: Decode Keystore
        run: |
          # فك تشفير المفتاح (هذا الجزء نجح في محاولاتك السابقة)
          echo "${{ secrets.KEYSTORE_FILE }}" | tr -dc 'a-zA-Z0-9+/=' | base64 --decode > android/app/release.jks

      - name: Generate Signed APK
        run: |
          cd android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          
          # تشغيل البناء مع إجبار النظام على تجاوز أخطاء المكتبات غير الحرجة
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Vortex Release v1.0.${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
