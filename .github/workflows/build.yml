name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clean and Build APK
        run: |
          # 1. تنظيف شامل للمحاولات السابقة
          rm -rf android www package.json package-lock.json
          
          # 2. تجهيز مجلد الويب
          mkdir www
          cp index.html www/ 2>/dev/null || true
          cp -r * www/ 2>/dev/null || true
          # إزالة مجلد github من داخل www لضمان نظافة التطبيق
          rm -rf www/.github
          
          # 3. إنشاء ملفات الإعدادات وتثبيت الأدوات
          echo '{"name": "vortextrust", "version": "1.0.0"}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 4. بناء مشروع أندرويد من الصفر
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android
          npx cap copy
          
          # 5. بناء ملف الـ APK (مع أمر التنظيف الداخلي)
          cd android && ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
