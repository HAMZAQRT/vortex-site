name: Vortex Final Power Fix
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Force Permissions & Prepare
        run: |
          # منح صلاحية كاملة للمجلد والمحتويات
          chmod -R 777 .
          
          # إنشاء مجلد www ونقل الملفات إليه
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          
          npm install
          # مسح المجلد القديم وإضافة أندرويد من جديد
          rm -rf android
          npx cap add android
          npx cap sync android
          
          # منح صلاحية التنفيذ لملفات أندرويد الجديدة
          chmod -R +x android/

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/my-release-key.jks

      - name: Build Official APK
        run: |
          cd android
          # منح صلاحية التنفيذ لملف gradlew تحديداً
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=my-release-key.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Official-Success
          path: android/app/build/outputs/apk/release/*.apk
