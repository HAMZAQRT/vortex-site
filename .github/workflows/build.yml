name: Vortex Production Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Signed APK / AAB
        run: |
          cd android
          ./gradlew assembleRelease   # أو bundleRelease لـ AAB
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}  # إلخ
