name: Final Vortex Build
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # تم التحديث لحل خطأ invalid source release 21
          distribution: 'zulu'

      - name: Setup Environment
        run: |
          echo '{"name": "vortex-app", "version": "1.0.0"}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          # تهيئة نظيفة بدون خيارات خاطئة
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android || true
          npx cap sync android

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/release.jks

      - name: Build Signed APK
        run: |
          cd android && chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v11.0.${{ github.run_number }}"
          name: "Vortex APK v11.${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
