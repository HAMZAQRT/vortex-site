name: Build Signed APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp -r * www/ 2>/dev/null || true

      - name: Initialize Capacitor and Android
        run: |
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android
          npx cap copy

      - name: Decode Keystore
        run: |
          # وضع المفتاح في المجلد الصحيح الذي تم إنشاؤه للتو
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/my-release-key.jks

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=my-release-key.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-Signed-APK
          # هذا السطر سيبحث في كل المجلدات عن أي ملف apk
          path: "**/*.apk"
          if-no-files-found: error
