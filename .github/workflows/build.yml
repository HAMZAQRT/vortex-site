name: Build and Release APK
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www && cp -r * www/ 2>/dev/null || true
          npx cap init "VortexApp" "com.vortextrust.app" --web-dir www
          npx cap add android && npx cap copy

      - name: Decode Keystore
        run: |
          # فك تشفير الملف ووضعه داخل مجلد الأندرويد
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/release.jks

      - name: Build APK
        run: |
          cd android && chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Move APK to Root
        # هذه الخطوة هي الأهم: سحب الملف من المجلدات العميقة ووضعه أمام السيرفر مباشرة
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk VortexApp-Final.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}.${{ github.run_attempt }}"
          name: "Vortex Update v1.0.${{ github.run_number }}"
          # هنا نأمر السيرفر برفع الملف الذي وضعناه في المجلد الرئيسي
          files: VortexApp-Final.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
